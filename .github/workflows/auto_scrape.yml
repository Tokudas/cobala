name: Auto Scrape TV360 Key

# Lên lịch chạy tự động
on:
  schedule:
    # Chạy mỗi 30 phút (Bạn có thể đổi thành '*/15 * * * *' cho 15 phút)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Tạo thêm nút bấm để bạn có thể chạy thủ công bất cứ lúc nào

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    steps:
      # 1. Clone kho lưu trữ về máy chủ của GitHub
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Cài đặt môi trường Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. Cài đặt thư viện requests
      - name: Install libraries
        run: pip install requests

      # 4. Chạy file cào dữ liệu
      - name: Run Scraper Script
        run: python main.py

      # 5. Lưu lại file playlist.m3u vừa được tạo lên GitHub
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          # Chỉ commit nếu file có sự thay đổi
          git commit -m "Tự động cập nhật Key TV360" || exit 0
          git push
          
