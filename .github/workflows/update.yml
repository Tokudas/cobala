name: Auto Update YouTube Live

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Node.js & yt-dlp (Nightly)
        run: |
          sudo apt-get update && sudo apt-get install -y nodejs
          python -m pip install --upgrade pip
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Chay Script tao M3U
        run: python update_links.py

      - name: Commit and Push M3U file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          git commit -m "Auto updated m3u link" || exit 0
          git push
